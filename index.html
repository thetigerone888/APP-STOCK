<title>MARBOHUB POS</title>

<style>*{margin:0;padding:0;box-sizing:border-box}body{background:#0E0F14;overflow-x:hidden;-webkit-tap-highlight-color:transparent}#root{min-height:100vh}#pin-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;flex-direction:column;gap:16px;font-family:'Noto Sans Thai',system-ui,sans-serif;color:#EDEEF3}#pin-screen input{width:160px;text-align:center;background:#0E0F14;border:2px solid #2A2E3C;border-radius:14px;color:#EDEEF3;padding:14px 16px;font-size:22px;font-weight:800;letter-spacing:8px;outline:none}#pin-screen button{background:#F5A623;color:#1A1405;border:none;border-radius:12px;font-weight:800;font-size:15px;padding:12px 40px;cursor:pointer;font-family:inherit}#pin-screen .err{color:#F87171;font-size:13px;font-weight:700;display:none}</style>
</head>
<body>
<div id="pin-screen">
  <div style="font-size:48px">🐯</div>
  <div style="font-weight:800;font-size:20px">MARBOHUB <span style="color:#F5A623">POS</span></div>
  <div style="color:#8B91A3;font-size:13px">กรอก PIN เพื่อเข้าใช้งาน</div>
  <input id="pin-input" type="password" inputmode="numeric" maxlength="8" placeholder="PIN" autofocus>
  <button onclick="tryPin()">เข้าสู่ระบบ</button>
  <div class="err" id="pin-err">PIN ไม่ถูกต้อง</div>
</div>
<div id="root"></div>
<script>
function tryPin(){
  var p=document.getElementById("pin-input").value;
  localStorage.setItem("mh_pin",p);
  checkPin(p);
}
document.addEventListener("keydown",function(e){if(e.key==="Enter"&&document.getElementById("pin-screen").style.display!=="none")tryPin();});
function checkPin(pin){
  fetch("api.php?action=load&pin="+encodeURIComponent(pin))
    .then(function(r){return r.json()})
    .then(function(d){
      if(d.error){document.getElementById("pin-err").style.display="block";return;}
      document.getElementById("pin-screen").style.display="none";
      loadApp();
    })
    .catch(function(){
      // API ไม่พร้อม → ให้เข้าได้ (ใช้ข้อมูลในเครื่อง)
      document.getElementById("pin-screen").style.display="none";
      loadApp();
    });
}
// ถ้ามี PIN เก่า → ลองเข้าอัตโนมัติ
var savedPin=localStorage.getItem("mh_pin");
if(savedPin)checkPin(savedPin);
